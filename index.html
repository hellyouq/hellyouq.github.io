<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>HellPak — Bio</title>
<style>
  /* ===== ШРИФТЫ ===== */
  @font-face {
    font-family: 'Consolas';
    src: url('assets/fonts/consolas.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'Unbounded';
    src: url('assets/fonts/unbounded.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }
  @font-face {
    font-family: 'Radware';
    src: url('assets/fonts/radware.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    background: #0a0c0e;
    font-family: 'Consolas', monospace;
    color: #eef2f5;
    overflow-x: hidden;
    min-height: 100vh;
    position: relative;
    cursor: default;
    line-height: 1.5;
  }

  /* ========== ЧИСТЫЙ LIQUID GLASS — БЕЗ СИНЕГО, ТОЛЬКО ПРОЗРАЧНОСТЬ, БЛИКИ, СЛОИ ========== */
  
  /* ОВЕРЛЕЙ — кристально чистое стекло */
  .click-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(15, 20, 25, 0.4);
    backdrop-filter: blur(28px) saturate(220%);
    -webkit-backdrop-filter: blur(28px) saturate(220%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10000;
    cursor: pointer;
    /* стеклянная рамка с нейтральным свечением */
    box-shadow: inset 0 0 60px rgba(255, 255, 245, 0.12), 0 0 0 1px rgba(255, 255, 255, 0.2);
  }

  /* слоистые блики — жидкое стекло без синевы */
  .click-overlay::before {
    content: "";
    position: absolute;
    top: -30%;
    left: -20%;
    width: 140%;
    height: 150%;
    background: radial-gradient(circle at 40% 30%, rgba(255, 250, 235, 0.2) 0%, rgba(220, 230, 240, 0.05) 70%);
    pointer-events: none;
    animation: liquidShimmer 14s infinite ease-in-out;
  }

  .click-overlay::after {
    content: "";
    position: absolute;
    bottom: -20%;
    right: -15%;
    width: 100%;
    height: 100%;
    background: radial-gradient(ellipse at 70% 80%, rgba(245, 245, 255, 0.12), transparent 70%);
    pointer-events: none;
    animation: glassFlow 10s infinite alternate;
  }

  @keyframes liquidShimmer {
    0% { transform: translate(-5%, -5%) rotate(0deg); opacity: 0.4; }
    50% { transform: translate(6%, 4%) rotate(2deg); opacity: 0.9; }
    100% { transform: translate(-5%, -5%) rotate(0deg); opacity: 0.4; }
  }

  @keyframes glassFlow {
    0% { transform: scale(1) translate(0, 0); opacity: 0.3; }
    100% { transform: scale(1.2) translate(3%, 2%); opacity: 0.7; }
  }

  .click-me-text {
    font-family: 'Radware', sans-serif;
    font-size: clamp(1.8rem, 8vw, 3rem);
    color: #f0f4fa;
    text-shadow: 0 0 20px rgba(255, 255, 245, 0.6), 0 0 35px rgba(200, 210, 230, 0.4);
    animation: glassPulseNeutral 2.2s ease-in-out infinite;
    letter-spacing: 3px;
    background: rgba(25, 30, 40, 0.3);
    padding: 0.7em 1.8em;
    border-radius: 80px;
    backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 245, 0.5);
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.2), inset 0 1px 2px rgba(255, 255, 250, 0.4);
    transition: 0.2s;
  }

  @keyframes glassPulseNeutral {
    0%, 100% { opacity: 0.92; transform: scale(1); border-color: rgba(255, 255, 240, 0.45); text-shadow: 0 0 18px rgba(255, 245, 220, 0.6); }
    50% { opacity: 1; transform: scale(1.04); border-color: rgba(255, 255, 255, 0.85); text-shadow: 0 0 35px rgba(255, 250, 230, 0.9); }
  }

  /* видеофон — нейтральный, без агрессивных тонов */
  .video-background {
    position: fixed;
    inset: 0;
    z-index: -2;
    overflow: hidden;
  }
  .video-background video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: brightness(0.5) contrast(1.05) blur(3px) grayscale(0.15);
  }
  .video-overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at 30% 40%, rgba(20, 25, 32, 0.5), rgba(8, 10, 14, 0.85));
    z-index: -1;
  }

  .main-content {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    padding: 20px;
    gap: 22px;
    filter: blur(0);
    transition: filter 0.5s cubic-bezier(0.2, 0.9, 0.3, 1.1);
  }
  .main-content.blurred {
    filter: blur(28px);
  }

  .content-wrapper {
    width: 100%;
    max-width: 720px;
    transition: transform 0.1s cubic-bezier(0.2, 0.5, 0.2, 1);
    will-change: transform;
  }

  /* ===== ОСНОВНОЙ ФРЕЙМ — ЧИСТОЕ LIQUID GLASS, БЕЗ СИНЕГО ===== */
  .bio-frame {
    background: rgba(18, 22, 28, 0.45);
    backdrop-filter: blur(22px) saturate(210%);
    -webkit-backdrop-filter: blur(22px) saturate(210%);
    border: 1px solid rgba(255, 255, 245, 0.28);
    border-radius: 48px;
    padding: 32px 28px;
    box-shadow: 0 30px 45px -20px rgba(0, 0, 0, 0.5), inset 0 1px 1px rgba(255, 255, 250, 0.2), inset 0 -1px 0 rgba(0, 0, 0, 0.08);
    width: 100%;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  /* стеклянный слой с мягкими бликами */
  .bio-frame::before {
    content: "";
    position: absolute;
    top: -15%;
    left: -10%;
    width: 70%;
    height: 130%;
    background: linear-gradient(125deg, rgba(255, 250, 240, 0.12), transparent 70%);
    pointer-events: none;
    transform: rotate(8deg);
    border-radius: 40px;
  }
  .bio-frame::after {
    content: "";
    position: absolute;
    bottom: 5%;
    right: -5%;
    width: 50%;
    height: 60%;
    background: radial-gradient(ellipse, rgba(245, 245, 250, 0.1), transparent);
    pointer-events: none;
  }

  /* аватар — стеклянное кольцо без синевы */
  .avatar-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 28px;
  }
  .avatar-ring {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(235, 240, 250, 0.6), rgba(190, 200, 215, 0.4));
    padding: 3px;
    box-shadow: 0 0 28px rgba(255, 255, 240, 0.3), 0 8px 20px rgba(0, 0, 0, 0.25);
    margin-bottom: 16px;
    backdrop-filter: blur(2px);
  }
  .avatar-image {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255, 250, 240, 0.7);
    background: #1e242c;
    display: block;
  }
  .nickname-large {
    font-family: 'Unbounded', sans-serif;
    font-size: clamp(2rem, 8vw, 2.9rem);
    font-weight: 700;
    background: linear-gradient(135deg, #f4f9ff, #d0deec);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 12px rgba(255, 245, 220, 0.4);
    letter-spacing: 1px;
  }

  /* БИО-КАРТА — прозрачное слоистое стекло */
  .bio-card {
    background: rgba(15, 20, 28, 0.4);
    backdrop-filter: blur(20px);
    border-radius: 36px;
    border: 1px solid rgba(255, 255, 245, 0.25);
    padding: 26px 24px;
    margin: 20px 0 14px;
    box-shadow: 0 18px 35px -12px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 250, 0.15);
  }

  .bio-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-family: 'Radware', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 2px;
    color: #eef3fc;
    text-shadow: 0 0 4px rgba(255, 250, 235, 0.5);
    border-bottom: 1px solid rgba(255, 245, 225, 0.3);
    padding-bottom: 14px;
    margin-bottom: 20px;
  }
  .bio-header span:first-child, .bio-header span:last-child { color: #f0f5fd; }

  .bio-lines {
    font-family: 'Consolas', monospace;
    font-size: 1.2rem;
    line-height: 2.2;
    color: #edf4fe;
  }
  .bio-lines p {
    display: flex;
    align-items: baseline;
    flex-wrap: wrap;
    gap: 8px;
    border-left: 3px solid rgba(255, 250, 230, 0.6);
    padding-left: 20px;
    margin: 14px 0;
    background: linear-gradient(90deg, rgba(255, 250, 235, 0.05), transparent);
    border-radius: 0 16px 16px 0;
  }
  .bio-lines strong {
    color: #eef2f0;
    font-weight: 600;
    min-width: 88px;
    font-family: 'Unbounded', sans-serif;
    font-size: 0.95rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .bio-lines a {
    color: #f0f4fc;
    text-decoration: none;
    border-bottom: 1px solid rgba(255, 250, 235, 0.6);
    transition: 0.2s;
    word-break: break-word;
  }
  .bio-lines a:hover {
    color: white;
    border-bottom-color: #fff9ea;
    text-shadow: 0 0 6px rgba(255, 245, 210, 0.7);
  }
  .discord-light {
    color: #f0f5ff;
    background: rgba(30, 35, 45, 0.5);
    padding: 4px 14px;
    border-radius: 36px;
    font-size: 1rem;
    border: 1px solid rgba(255, 245, 220, 0.4);
    backdrop-filter: blur(6px);
  }

  /* ===== САУНДБАР — АБСОЛЮТНО ПРОЗРАЧНОЕ СТЕКЛО ===== */
  .soundbar-container {
    background: rgba(12, 18, 24, 0.5);
    backdrop-filter: blur(26px) saturate(200%);
    border: 1px solid rgba(255, 250, 240, 0.3);
    border-radius: 60px;
    padding: 14px 24px;
    width: 100%;
    max-width: 720px;
    margin-top: 8px;
    box-shadow: 0 20px 35px -15px rgba(0, 0, 0, 0.45), inset 0 0.5px 0 rgba(255, 255, 245, 0.2);
  }

  .soundbar-row {
    display: flex;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
  }
  .album-mini {
    width: 48px;
    height: 48px;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid rgba(255, 250, 235, 0.5);
    box-shadow: 0 6px 14px rgba(0, 0, 0, 0.25);
    background: #1f262f;
  }
  .album-mini img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .track-info-mini {
    flex: 2;
    min-width: 140px;
  }
  .track-name-mini {
    font-weight: 700;
    color: #f5faff;
    font-size: 1.05rem;
    letter-spacing: -0.2px;
    text-shadow: 0 0 2px rgba(0,0,0,0.2);
  }
  .track-artist-mini {
    font-size: 0.8rem;
    color: #cfdfef;
    font-family: 'Unbounded', sans-serif;
  }

  /* стеклянные волны */
  .sound-wave {
    display: flex;
    align-items: center;
    gap: 3px;
    margin-right: 6px;
  }
  .wave-bar {
    width: 3px;
    height: 14px;
    background: linear-gradient(to top, #eef3fc, #ffffff);
    border-radius: 3px;
    animation: clearWave 1.1s ease infinite;
    box-shadow: 0 0 5px rgba(255, 250, 235, 0.7);
  }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes clearWave {
    0%,100% { transform: scaleY(0.35); opacity: 0.7; }
    50% { transform: scaleY(1.3); opacity: 1; }
  }

  /* кнопки — стеклянные, без синевы */
  .controls-mini {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    margin-top: 10px;
    width: 100%;
  }
  .ctrl-btn {
    background: rgba(25, 30, 38, 0.55);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 250, 235, 0.55);
    color: #f0f6ff;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    font-size: 1.3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 245, 0.3);
  }
  .ctrl-btn:hover {
    background: rgba(55, 65, 80, 0.7);
    transform: scale(1.06);
    border-color: rgba(255, 255, 245, 0.85);
    box-shadow: 0 0 12px rgba(255, 250, 225, 0.5);
  }
  .ctrl-btn:active { transform: scale(0.96); }

  .progress-area {
    flex: 3;
    min-width: 150px;
    height: 5px;
    background: rgba(40, 45, 55, 0.6);
    border-radius: 20px;
    cursor: pointer;
    position: relative;
    backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #f0f4fc, #ffffff);
    border-radius: 20px;
    position: relative;
    box-shadow: 0 0 6px rgba(255, 250, 235, 0.8);
  }

  .time-digits {
    font-family: 'Consolas', monospace;
    color: #eaf0f8;
    font-size: 0.8rem;
    font-weight: 500;
    background: rgba(20, 25, 32, 0.5);
    padding: 3px 12px;
    border-radius: 30px;
    backdrop-filter: blur(4px);
    border: 1px solid rgba(255, 250, 235, 0.2);
  }

  .volume-line {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .volume-slider {
    width: 78px;
    height: 4px;
    border-radius: 10px;
    background: #3a3f4a;
    accent-color: #eceff5;
    cursor: pointer;
  }

  @media (max-width: 550px) {
    .bio-lines p { flex-direction: column; align-items: flex-start; gap: 4px; }
    .controls-mini { justify-content: space-between; }
    .progress-area { min-width: 110px; }
    .bio-frame { padding: 22px 18px; }
  }
</style>
</head>
<body>

<!-- ЧИСТЫЙ LIQUID GLASS ОВЕРЛЕЙ — БЕЗ СИНЕГО -->
<div class="click-overlay" id="clickOverlay">
  <div class="click-me-text">  <br>✦ Click to me ✦</div>
</div>

<div class="video-background">
  <video loop muted autoplay playsinline>
    <source src="assets/videos/backmenu.mp4" type="video/mp4">
  </video>
</div>
<div class="video-overlay"></div>

<div class="main-content blurred" id="mainContent">
  <div class="content-wrapper" id="contentWrapper">

    <!-- СТЕКЛЯННЫЙ БИО-ФРЕЙМ (нейтральный свет) -->
    <div class="bio-frame">
      <div class="avatar-block">
        <div class="avatar-ring">
          <img class="avatar-image" src="assets/images/avatar.jpg" alt="Hell_Pak" onerror="this.src='https://via.placeholder.com/120x120?text=HELL'">
        </div>
        <div class="nickname-large"><Хелл_Пак/div>
      </div>

      <div class="bio-card">
        <div class="bio-header">
          <span>🙈Bio —></span>
          <span><—Bio🙈</span>
        </div>

        <div class="bio-lines">
          <p><strong>discord:</strong> <span class="discord-light">.hellpaq</span></p>
          <p><strong>telegram:</strong> <a href="https://t.me/hellyouq" target="_blank">@vknews2</a></p>
          <p><strong>youtube:</strong> <a href="https://youtube.com/@hell_youq?si=bilPx4Lix8aRRZZU" target="_blank">youtube.com/@hell_youq</a></p>
        </div>
        <div style="margin-top: 18px; border-top: 1px solid rgba(255, 245, 225, 0.35); text-align: right; padding-top: 8px; color: #cbdae6; font-size: 0.7rem; letter-spacing: 1px;">✦ site version. 0.4 ✦</div>
      </div>
    </div>

    <!-- САУНДБАР — СТЕКЛЯННЫЙ, НЕЙТРАЛЬНЫЙ -->
    <div class="soundbar-container">
      <div class="soundbar-row">
        <div class="album-mini">
          <img id="albumCover" src="https://avatars.mds.yandex.net/i?id=36290e963640420d065ae1ed91b8b543_l-4569008-images-thumbs&n=13" alt="glass cover">
        </div>
        <div class="track-info-mini">
          <div class="track-name-mini" id="trackName">RUSSIA DREAMS</div>
          <div class="track-artist-mini" id="trackArtist">Hell_Pak</div>
        </div>
        <div class="sound-wave" id="soundWave" style="display: none;">
          <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        </div>
      </div>

      <div class="controls-mini">
        <button class="ctrl-btn" id="playBtn">▶</button>
        <div class="time-digits" id="timeDisplay">0:00 / 0:00</div>
        <div class="progress-area" id="progressContainer">
          <div class="progress-fill" id="progress"></div>
        </div>
        <div class="volume-line">
          <input type="range" min="0" max="100" value="55" class="volume-slider" id="volumeSlider">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const overlay = document.getElementById('clickOverlay');
    const main = document.getElementById('mainContent');
    const playBtn = document.getElementById('playBtn');
    const progress = document.getElementById('progress');
    const progressContainer = document.getElementById('progressContainer');
    const volumeSlider = document.getElementById('volumeSlider');
    const trackNameEl = document.getElementById('trackName');
    const trackArtistEl = document.getElementById('trackArtist');
    const timeDisplay = document.getElementById('timeDisplay');
    const soundWave = document.getElementById('soundWave');
    const albumCover = document.getElementById('albumCover');
    const wrapper = document.getElementById('contentWrapper');

    const tracks = [{
      name: 'грустинка',
      artist: 'onokami',
      src: 'assets/sound/music.mp3',
      cover: 'https://avatars.mds.yandex.net/i?id=36290e963640420d065ae1ed91b8b543_l-4569008-images-thumbs&n=13'
    }];

    let currentTrack = 0;
    let isPlaying = false;
    const audio = new Audio();

    function initAudio() {
      audio.src = tracks[currentTrack].src;
      audio.volume = volumeSlider.value / 100;
      audio.setAttribute('playsinline', '');
      audio.setAttribute('webkit-playsinline', '');
      audio.preload = 'metadata';
      trackNameEl.textContent = tracks[currentTrack].name;
      trackArtistEl.textContent = tracks[currentTrack].artist;
      albumCover.src = tracks[currentTrack].cover;
    }

    function formatTime(sec) {
      if (isNaN(sec)) sec = 0;
      let m = Math.floor(sec / 60);
      let s = Math.floor(sec % 60);
      return m + ':' + (s < 10 ? '0' + s : s);
    }

    function updateTime() {
      if (audio.duration && !isNaN(audio.duration)) {
        let cur = formatTime(audio.currentTime);
        let dur = formatTime(audio.duration);
        timeDisplay.textContent = cur + ' / ' + dur;
        let percent = (audio.currentTime / audio.duration) * 100;
        progress.style.width = percent + '%';
      } else {
        timeDisplay.textContent = '0:00 / 0:00';
      }
    }

    async function playAudio() {
      try {
        await audio.play();
        playBtn.textContent = '❚❚';
        isPlaying = true;
        soundWave.style.display = 'flex';
      } catch (e) {
        console.warn('autoplay blocked', e);
        playBtn.textContent = '▶';
        isPlaying = false;
        soundWave.style.display = 'none';
      }
    }

    overlay.addEventListener('click', function() {
      this.style.display = 'none';
      main.classList.remove('blurred');
      playAudio();
    });

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        playAudio();
      } else {
        audio.pause();
        playBtn.textContent = '▶';
        isPlaying = false;
        soundWave.style.display = 'none';
      }
    });

    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value / 100;
    });

    audio.addEventListener('timeupdate', updateTime);
    audio.addEventListener('loadedmetadata', updateTime);
    audio.addEventListener('canplay', updateTime);

    progressContainer.addEventListener('click', (e) => {
      let rect = progressContainer.getBoundingClientRect();
      let clickX = e.clientX - rect.left;
      let percent = clickX / rect.width;
      if (audio.duration && isFinite(audio.duration)) {
        audio.currentTime = percent * audio.duration;
      }
    });

    audio.addEventListener('ended', () => {
      audio.currentTime = 0;
      if (isPlaying) playAudio();
    });

    initAudio();
    soundWave.style.display = 'none';
    updateTime();

    // плавный параллакс для эффекта жидкого движения (нейтральный)
    let mouseX = 0, mouseY = 0, wx = 0, wy = 0;
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (!isMobile) {
      document.addEventListener('mousemove', (e) => {
        mouseX = (e.clientX - window.innerWidth / 2) / 80;
        mouseY = (e.clientY - window.innerHeight / 2) / 80;
      });
      function moveGlass() {
        wx += (mouseX - wx) * 0.09;
        wy += (mouseY - wy) * 0.09;
        wrapper.style.transform = `translate(${wx}px, ${wy}px)`;
        requestAnimationFrame(moveGlass);
      }
      moveGlass();
    }

    // глитч-титул мягкий, без синих оттенков в восприятии
    const originalTitle = "HellPak - Bio";
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%&*";
    let glitchPhase = 0; 
    let stepCount = 0;

    function softGlitchTitle() {
      if (glitchPhase === 0) {
        let newTitle = "";
        for (let i = 0; i < originalTitle.length; i++) {
          const ch = originalTitle[i];
          if (ch === ' ' || ch === '-') newTitle += ch;
          else newTitle += chars[Math.floor(Math.random() * chars.length)];
        }
        document.title = newTitle;
        stepCount++;
        if (stepCount >= 14) { stepCount = 0; glitchPhase = 1; }
      } else {
        document.title = originalTitle;
        stepCount++;
        if (stepCount >= 6) { stepCount = 0; glitchPhase = 0; }
      }
    }
    setInterval(softGlitchTitle, 130);
  })();
</script>
